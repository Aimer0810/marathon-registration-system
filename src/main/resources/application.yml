server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/marathon_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.marathon.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.marathon.mapper: debug

ai:
  deepseek:
    enabled: true
    base-url: https://api.deepseek.com
    api-key: "${DEEPSEEK_API_KEY}"
    model: deepseek-v4-pro
    temperature: 0.7
